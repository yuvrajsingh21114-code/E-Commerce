<!DOCTYPE html>
<html>
<head>
  <title>React One File</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
 
  <script type="text/babel">

    function SearchBox({saveMessage,setSaveMessage}){
        
        const[message,setMessage]=React.useState('');

        function updateValue(event){
            setMessage(event.target.value);
        }

        function update(){
            setSaveMessage([   
                ...saveMessage,
                {
                    newmessage:message 
                }           
            ])

            setMessage('')
        }
        return (
            <div class="search-box">
                <input placeholder="Enter" class="search-input" value={message} onChange={updateValue}/>
                <button onClick={update} class="search-button">Add</button>
            </div>
        );
    }

    

    function Item({saveMessage}){
        return(
            <div >
                {saveMessage.map((item)=>{
                    return(
                       <div class="message">
                            {item.newmessage}
                       </div> 
                    );
            })}
            </div>
        );
    }
    
    function App() {
        const[saveMessage,setSaveMessage]=React.useState([]);
        return (
            <div class="app-container">
                <SearchBox saveMessage={saveMessage} setSaveMessage={setSaveMessage} />
                <Item saveMessage={saveMessage}/>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
